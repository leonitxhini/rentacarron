kind = "web"
previewPath = "/rron-alb/"
title = "RRON Landing — Shqip"
version = "1.0.0"
id = "artifacts/rron-alb"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rron-alb/" ]
localPort = 18171

[services.development]
run = "pnpm --filter @workspace/rron-alb run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rron-alb", "run", "build" ]
publicDir = "artifacts/rron-alb/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18171"
BASE_PATH = "/rron-alb/"
