kind = "web"
previewPath = "/rron-ad/"
title = "RRON Ad Page"
version = "1.0.0"
id = "artifacts/rron-ad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rron-ad/" ]
localPort = 26122

[services.development]
run = "pnpm --filter @workspace/rron-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rron-ad", "run", "build" ]
publicDir = "artifacts/rron-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26122"
BASE_PATH = "/rron-ad/"
