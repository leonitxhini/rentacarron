kind = "video"
previewPath = "/rron-video-ad/"
title = "RRON Video Ad"
version = "1.0.0"
id = "artifacts/rron-video-ad"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rron-video-ad/" ]
localPort = 18246

[services.development]
run = "pnpm --filter @workspace/rron-video-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rron-video-ad", "run", "build" ]
publicDir = "artifacts/rron-video-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18246"
BASE_PATH = "/rron-video-ad/"
